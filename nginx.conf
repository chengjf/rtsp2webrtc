server {
    listen 80;
    server_name _;  # 替换为你的域名或 IP，例如：192.168.1.100

    # ── 静态文件（HTML / JS / WASM）──────────────────────────────────────────
    # /rtsp/ 前缀下的文件映射到 web 目录
    location /rtsp/ {
        alias /path/to/web/;  # 替换为实际路径，例如：/opt/rtsp2webrtc/web/
        try_files $uri $uri/ =404;
    }

    # ── WebSocket：/rtsp/ws → 后端 /ws（WebRTC 信令）────────────────────────
    location /rtsp/ws {
        proxy_pass http://127.0.0.1:9889/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # WebRTC 信令握手通常在几十秒内完成，设 60s 超时即可
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── WebSocket：/rtsp/live → 后端 /live（FFmpeg 直播流）──────────────────
    location /rtsp/live {
        proxy_pass http://127.0.0.1:9889/live;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # 直播流是持续长连接，超时设长一些
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── REST API：/rtsp/api/ → 后端 /api/ ───────────────────────────────────
    location /rtsp/api/ {
        proxy_pass http://127.0.0.1:9889/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
