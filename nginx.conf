server {
    listen 80;
    server_name _;  # 替换为你的域名或 IP，例如：192.168.1.100

    # ── 静态文件（HTML / JS / WASM）──────────────────────────────────────────
    root /path/to/web;  # 替换为你的 web 目录实际路径，例如：/opt/rtsp2webrtc/web
    index index.html;

    # ── WebSocket：/ws（WebRTC 信令）────────────────────────────────────────
    location /ws {
        proxy_pass http://127.0.0.1:9889;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # WebRTC 信令握手通常在几十秒内完成，设 60s 超时即可
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── WebSocket：/live（FFmpeg 直播流）────────────────────────────────────
    location /live {
        proxy_pass http://127.0.0.1:9889;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # 直播流是持续长连接，超时设长一些
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── REST API ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:9889;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── 静态文件兜底（SPA 风格，找不到文件返回 index.html）─────────────────
    location / {
        try_files $uri $uri/ =404;
    }
}
